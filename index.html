<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Квадрат">

<link rel="manifest" href="./manifest.json">
<link rel="icon" href="./apple-touch-icon.png">
<link rel="apple-touch-icon" href="./apple-touch-icon.png">

<title>Магический квадрат</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

  <div class="mode-switch">
    <span class="mode-label">Обычный квадрат</span>

    <label class="switch">
      <input type="checkbox" id="modeToggle" checked>
      <span class="slider"></span>
    </label>

    <span class="mode-label">Дата рождения</span>
  </div>

  <div class="card">
    <div id="grid" class="grid"></div>
  </div>

  <div id="hint" class="hint">Введи дату рождения</div>

  <div class="sum-box">
    <div id="sumLabel" class="sum-label">Сумма</div>
    <div id="sum" class="sum-value" inputmode="numeric">0</div>
  </div>

  <button id="clearBtn">Очистить</button>

  <button id="imageBtn">Картинка</button>

  <img id="preview" alt="Квадрат" hidden>

</div>

<script src="app.js"></script>

</body>
</html>
